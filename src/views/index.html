<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda de Correos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>
  <div id="app" class="container mt-5">

    <form class="mb-3" id="agendaForm" action="/agregar-correo" method="post">
      <label for="email" class="form-label"><b> Dirección de Correo:</b></label>
      <div class="form-floating">
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <button type="submit" class="btn btn-primary mt-2">Agregar a la Agenda</button>
    </form>

    <form class="mb-3" id="enviarCorreoForm" action="/enviar-correo" method="post">
      <label for="mensaje" class="form-label"><b>Mensaje:</b></label>
      <div class="form-floating">
        <textarea class="form-control" id="mensaje" name="mensaje" required></textarea>
      </div>
      <button type="submit" class="btn btn-success mt-2">Enviar Correo a la Agenda</button>
    </form>
  
    <div class="mb-3">
      <h3>Correos en la Agenda</h3>
         <ul id="listaCorreos" class="list-group">
      </ul>
    </div>

  </div>
  
  <script src="../../index.js"></script>
  <script src="../js/agenda.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

</body>
</html>
